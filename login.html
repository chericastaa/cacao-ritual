<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Cacao Ritual</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x2615;</text></svg>">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <header>
        <nav class="navbar navbar--solida">
            <div class="navbar__logo">
                <a href="index.html">Cacao Ritual</a>
            </div>
            <input type="checkbox" id="nav-toggle" class="navbar__toggle">
            <label for="nav-toggle" class="navbar__hamburger" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </label>
            <ul class="navbar__menu">
                <li><a href="tienda.html">Nuestra Tienda</a></li>
                <li><a href="tutoriales.html">Tutoriales</a></li>
                <li><a href="locales.html">Locales</a></li>
                <li><a href="menu-tienda.html">Nuestro Menú</a></li>
                <li><a href="trabaja-en-tdc.html">Trabajá con Nosotros</a></li>
                <li><a href="franquicias.html">Franquicias</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
            <div class="navbar__iconos">
                <i class="fa-solid fa-magnifying-glass"></i>
                <i class="fa-solid fa-bag-shopping"></i>
            </div>
        </nav>
    </header>

    <main class="login-main">

        <div class="login-card">

            <!-- tabs -->
            <div class="login-tabs">
                <button class="login-tab login-tab--activo" id="tab-login" onclick="mostrarTab('login')">
                    Iniciar Sesión
                </button>
                <button class="login-tab" id="tab-registro" onclick="mostrarTab('registro')">
                    Registrarse
                </button>
            </div>

            <!-- formulario login -->
            <form id="form-login" class="formulario" onsubmit="handleLogin(event)">
                <div class="login-card__titulo">
                    <h2>Bienvenido</h2>
                    <div class="separador"></div>
                </div>
                <div id="login-error" class="login-error" style="display:none"></div>
                <div class="formulario__grupo">
                    <label for="login-email">Correo Electrónico</label>
                    <input type="email" id="login-email" placeholder="tuemail@ejemplo.com" required>
                </div>
                <div class="formulario__grupo">
                    <label for="login-password">Contraseña</label>
                    <input type="password" id="login-password" placeholder="••••••" required>
                </div>
                <button type="submit" class="btn btn--oscuro" style="width:100%;margin-top:8px" id="btn-login">
                    Ingresar
                </button>
                <p class="login-link">
                    ¿No tenés cuenta?
                    <a href="#" onclick="mostrarTab('registro');return false">Registrate aquí</a>
                </p>
            </form>

            <!-- formulario registro -->
            <form id="form-registro" class="formulario" onsubmit="handleRegistro(event)" style="display:none">
                <div class="login-card__titulo">
                    <h2>Crear Cuenta</h2>
                    <div class="separador"></div>
                </div>
                <div id="registro-error" class="login-error" style="display:none"></div>
                <div class="formulario__grupo">
                    <label for="reg-nombre">Nombre completo</label>
                    <input type="text" id="reg-nombre" placeholder="Tu nombre" required>
                </div>
                <div class="formulario__grupo">
                    <label for="reg-email">Correo Electrónico</label>
                    <input type="email" id="reg-email" placeholder="tuemail@ejemplo.com" required>
                </div>
                <div class="formulario__grupo">
                    <label for="reg-password">Contraseña</label>
                    <input type="password" id="reg-password" placeholder="••••••" minlength="6" required>
                </div>
                <button type="submit" class="btn btn--oscuro" style="width:100%;margin-top:8px" id="btn-registro">
                    Crear Cuenta
                </button>
                <p class="login-link">
                    ¿Ya tenés cuenta?
                    <a href="#" onclick="mostrarTab('login');return false">Iniciá sesión</a>
                </p>
            </form>

        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/auth.js"></script>
    <script src="js/carrito.js"></script>
    <script>
        function mostrarTab(tab) {
            document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('form-registro').style.display = tab === 'registro' ? 'block' : 'none';
            document.getElementById('tab-login').classList.toggle('login-tab--activo', tab === 'login');
            document.getElementById('tab-registro').classList.toggle('login-tab--activo', tab === 'registro');
        }

        function handleLogin(e) {
            e.preventDefault();
            const errorEl = document.getElementById('login-error');
            const btn = document.getElementById('btn-login');
            errorEl.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Ingresando...';
            try {
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;
                login(email, password);
                window.location.href = 'index.html';
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Ingresar';
            }
        }

        function handleRegistro(e) {
            e.preventDefault();
            const errorEl = document.getElementById('registro-error');
            const btn = document.getElementById('btn-registro');
            errorEl.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Creando cuenta...';
            try {
                const nombre = document.getElementById('reg-nombre').value;
                const email = document.getElementById('reg-email').value;
                const password = document.getElementById('reg-password').value;
                registrar(nombre, email, password);
                window.location.href = 'index.html';
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Crear Cuenta';
            }
        }

        /* si ya está logueado, redirigir */
        document.addEventListener('DOMContentLoaded', () => {
            if (getUsuario()) window.location.href = 'index.html';
        });
    </script>

</body>

</html>
